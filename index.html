<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Infinity Notes with Custom Keyboard</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#262833">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">

<style>
  /* =========================================
     EXTREME NEUMORPHISM CSS - ALWAYS-ON NEON
     ========================================= */
  :root { 
    --row-height: 65px; 
    --num-width: 75px; 
    --font-main: 1.4rem; 
    
    /* Premium Matte Slate & Neon Mint Palette */
    --bg-base: #262833; 
    --accent: #00F3B9; 
    --text-main: #FFFFFF;
    --text-muted: #828A9F; 
    
    /* Perfected Color-Matched Shadows */
    --shadow-light: rgba(60, 63, 80, 0.6); 
    --shadow-dark: rgba(15, 16, 20, 0.9);  
    
    /* Massive pop for the main blocks */
    --extrude-massive: 9px 9px 18px var(--shadow-dark), -9px -9px 18px var(--shadow-light);
    --inset-massive: inset 9px 9px 18px var(--shadow-dark), inset -9px -9px 18px var(--shadow-light);
    
    /* Sharp pop for the keyboard keys */
    --extrude-keys: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
    --inset-keys: inset 6px 6px 14px var(--shadow-dark), inset -6px -6px 14px var(--shadow-light);
    
    --radius-soft: 18px; 
  }
  
  /* Reset */
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: var(--bg-base);
    overflow: hidden;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
    overscroll-behavior-y: none; 
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  *, *:before, *:after { box-sizing: inherit; }

  /* =========================================
     MAIN APP LAYOUT (Edge-to-Edge)
     ========================================= */
  .app-container {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    background: var(--bg-base);
  }

  /* --- Top 70%: Notes App Container --- */
  .notes-container {
    height: 70%; 
    position: relative;
    background-color: var(--bg-base);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding-bottom: 10px;
    z-index: 1;
  }

  /* Infinity Notes Specific Styles */
  .app-frame { display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; counter-reset: note-counter; }
  
  #notes-list { 
    display: flex; 
    flex-direction: column; 
    justify-content: flex-end; 
    width: 100%; 
    overflow-y: auto; 
    flex-grow: 1; 
    -webkit-mask-image: linear-gradient(to top, var(--bg-base) 80%, transparent 100%); 
    mask-image: linear-gradient(to top, var(--bg-base) 80%, transparent 100%); 
    padding-top: 20px;
    padding-bottom: 10px;
  }
  #notes-list::-webkit-scrollbar { display: none; } 

  .grid-row { 
    display: grid; 
    grid-template-columns: var(--num-width) 1fr; 
    width: 100%; 
    height: var(--row-height); 
    flex-shrink: 0; 
    background-color: transparent; 
    margin-bottom: 24px; 
  }
  .grid-row.hidden { display: none !important; }
  
  /* The numbers on the left - ALWAYS NEON */
  .spacer-line { 
    background-color: var(--bg-base); 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    color: var(--accent); 
    font-weight: 700; 
    font-family: 'JetBrains Mono', monospace; 
    position: relative; 
    border-radius: var(--radius-soft);
    /* Permanent 1px neon border added to the extrusion */
    box-shadow: var(--extrude-massive), 0 0 0 1px var(--accent);
    margin: 0 15px 0 20px;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .spacer-line.number::after { 
    counter-increment: note-counter; 
    content: counter(note-counter); 
    font-size: 1.1rem; 
    color: var(--accent); /* Number is now neon too */
    opacity: 1; 
    font-weight: 700; 
  }
  .spacer-line.infinity::after { 
    content: "∞"; 
    font-size: 2rem; 
    color: var(--accent); 
    opacity: 1; 
    text-shadow: 0 0 12px rgba(0, 243, 185, 0.5);
  }
  
  /* SAVED NOTES: Text areas - ALWAYS NEON */
  .content-wrapper { 
    position: relative; 
    background-color: var(--bg-base); 
    height: 100%; 
    display: flex; 
    border-radius: var(--radius-soft);
    /* Permanent 1px neon border */
    box-shadow: var(--extrude-massive), 0 0 0 1px var(--accent);
    margin-right: 20px;
    transition: all 0.15s ease-out;
  }

  /* Sinks in and flares up when editing an old note */
  .content-wrapper:focus-within {
    box-shadow: var(--inset-massive), 0 0 0 2px var(--accent), 0 0 15px rgba(0, 243, 185, 0.4);
  }
  
  /* LIVE TEXT AREA */
  .input-area .content-wrapper {
      box-shadow: var(--extrude-massive), 0 0 0 1px var(--accent) !important; 
  }
  
  .input-area .content-wrapper:focus-within {
      /* Stronger 2px flare for the active live area */
      box-shadow: var(--extrude-massive), 0 0 0 2px var(--accent), 0 0 15px rgba(0, 243, 185, 0.4) !important;
  }
  
  .note-content { 
    width: 100%; 
    height: 100%; 
    background-color: transparent; 
    color: var(--text-main); 
    border: none; 
    padding: 0 20px 0 20px; 
    font-size: var(--font-main); 
    font-weight: 600; 
    outline: none; 
    display: flex; 
    align-items: center; 
    caret-color: var(--accent); 
    white-space: pre; 
    overflow-x: auto; 
    overflow-y: hidden; 
    transition: transform 0.25s; 
    position: relative; 
    z-index: 2; 
    user-select: text; 
    letter-spacing: 0.5px; 
    scroll-behavior: smooth; 
  }
  .note-content::-webkit-scrollbar { display: none; }
  
  .input-area .note-content { color: var(--accent); font-weight: 800; text-shadow: 0 0 8px rgba(0, 243, 185, 0.3); }
  
  .delete-hint { position: absolute; right: 25px; top: 0; bottom: 0; display: flex; align-items: center; color: var(--accent); font-size: 0.85rem; font-weight: 800; z-index: 1; font-family: 'Inter', sans-serif; letter-spacing: 0.5px; opacity: 0.5; }
  .desktop-delete-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 65px; background-color: transparent; color: var(--accent); border: none; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; opacity: 0; transition: opacity 0.2s; text-shadow: 0 0 10px rgba(0, 243, 185, 0.5); }
  .content-wrapper:hover .desktop-delete-btn { opacity: 1; }
  @media (hover: none) { .desktop-delete-btn { display: none; } }
  
  #main-input { padding-top: 0; font-size: 1.85rem; font-weight: 800; caret-color: var(--accent); }
  #status-log { position: absolute; top: 10px; left: 20px; color: var(--accent); font-size: 11px; font-weight: 800; font-family: 'JetBrains Mono', monospace; z-index: 200; pointer-events: none; opacity: 0.8; letter-spacing: 1px;}

  /* --- Bottom 30%: Neumorphic Keyboard --- */
  .keyboard {
    height: 30%; 
    background-color: var(--bg-base); 
    padding: 3% 3% 5% 3%;
    display: flex;
    flex-direction: column;
    gap: 16px; 
    z-index: 10;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.4);
  }

  .kb-row { display: flex; justify-content: center; align-items: stretch; flex: 1; gap: 14px; }
  .kb-row.middle { padding: 0 5%; }
  
  .layout-container { display: contents; } 

  /* Extruded Keys - ALWAYS NEON */
  .key {
    background-color: var(--bg-base); 
    border: none; 
    border-radius: 12px; 
    color: var(--text-main); 
    font-size: clamp(16px, 4vw, 24px); 
    font-weight: 600;
    flex: 1; 
    /* Permanent 1px neon border added to the extrusion */
    box-shadow: var(--extrude-keys), 0 0 0 1px var(--accent);
    cursor: pointer; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    user-select: none; 
    -webkit-tap-highlight-color: transparent;
    transition: all 0.05s ease-out; 
  }
  
  /* REACTIVE LED GLOW: Deep Depressed Keys on Tap flare up */
  .key:active { 
    box-shadow: var(--inset-keys), 0 0 0 2px var(--accent), 0 0 15px rgba(0, 243, 185, 0.6); 
    color: var(--accent);
    transform: scale(0.96); 
    text-shadow: 0 0 8px rgba(0, 243, 185, 0.8); 
  }
  
  .key.special { font-weight: 700; color: var(--accent); font-size: clamp(14px, 3.5vw, 20px); opacity: 0.9;}
  .key.shift, .key.backspace { flex: 1.3; }
  .key.symbols { flex: 1.5; font-size: clamp(14px, 3vw, 18px); }
  .key.space { flex: 4; font-size: clamp(14px, 3vw, 18px); color: var(--accent); opacity: 0.8;}
  
  /* GO Button: Slightly thicker resting glow */
  .key.go { 
    color: var(--accent); 
    flex: 1.5; 
    font-size: clamp(16px, 3.5vw, 20px); 
    font-weight: 800; 
    box-shadow: var(--extrude-keys), 0 0 0 2px var(--accent);
    text-shadow: 0 0 10px rgba(0, 243, 185, 0.5);
  }
  
  /* GO Button: Gets insanely bright on tap */
  .key.go:active {
    box-shadow: var(--inset-keys), 0 0 0 4px var(--accent), 0 0 20px rgba(0, 243, 185, 0.8);
  }
  
  /* Active Caps Lock Key Style: Sinks and stays flared up */
  .key.shift.active { 
    box-shadow: var(--inset-keys), 0 0 0 2px var(--accent), 0 0 15px rgba(0, 243, 185, 0.5); 
    color: var(--accent); 
    transform: scale(0.96);
    text-shadow: 0 0 8px rgba(0, 243, 185, 0.8);
  }
</style>
</head>
<body>

<div class="app-container">

  <div class="notes-container">
    <div id="status-log">SYS.ONLINE</div>
    <div class="app-frame">
        <div id="notes-list"></div>
        <div class="input-area grid-row">
            <div class="spacer-line infinity"></div>
            <div class="content-wrapper">
                <div id="main-input" class="note-content" contenteditable="true" spellcheck="false" inputmode="none"></div>
            </div>
        </div>
    </div>
  </div>

  <div class="keyboard" id="keyboard">
    <div class="kb-row">
      <button class="key" data-val="1">1</button>
      <button class="key" data-val="2">2</button>
      <button class="key" data-val="3">3</button>
      <button class="key" data-val="4">4</button>
      <button class="key" data-val="5">5</button>
      <button class="key" data-val="6">6</button>
      <button class="key" data-val="7">7</button>
      <button class="key" data-val="8">8</button>
      <button class="key" data-val="9">9</button>
      <button class="key" data-val="0">0</button>
    </div>

    <div id="layout-letters" class="layout-container">
      <div class="kb-row">
        <button class="key" data-val="q">q</button>
        <button class="key" data-val="w">w</button>
        <button class="key" data-val="e">e</button>
        <button class="key" data-val="r">r</button>
        <button class="key" data-val="t">t</button>
        <button class="key" data-val="y">y</button>
        <button class="key" data-val="u">u</button>
        <button class="key" data-val="i">i</button>
        <button class="key" data-val="o">o</button>
        <button class="key" data-val="p">p</button>
      </div>
      <div class="kb-row middle">
        <button class="key" data-val="a">a</button>
        <button class="key" data-val="s">s</button>
        <button class="key" data-val="d">d</button>
        <button class="key" data-val="f">f</button>
        <button class="key" data-val="g">g</button>
        <button class="key" data-val="h">h</button>
        <button class="key" data-val="j">j</button>
        <button class="key" data-val="k">k</button>
        <button class="key" data-val="l">l</button>
      </div>
      <div class="kb-row">
        <button class="key special shift" data-val="shift">⇧</button>
        <button class="key" data-val="z">z</button>
        <button class="key" data-val="x">x</button>
        <button class="key" data-val="c">c</button>
        <button class="key" data-val="v">v</button>
        <button class="key" data-val="b">b</button>
        <button class="key" data-val="n">n</button>
        <button class="key" data-val="m">m</button>
        <button class="key special backspace" data-val="backspace">⌫</button>
      </div>
    </div>

    <div id="layout-symbols" class="layout-container" style="display: none;">
      <div class="kb-row">
        <button class="key" data-val="@">@</button>
        <button class="key" data-val="#">#</button>
        <button class="key" data-val="$">$</button>
        <button class="key" data-val="%">%</button>
        <button class="key" data-val="&">&amp;</button>
        <button class="key" data-val="*">*</button>
        <button class="key" data-val="-">-</button>
        <button class="key" data-val="+">+</button>
        <button class="key" data-val="(">(</button>
        <button class="key" data-val=")">)</button>
      </div>
      <div class="kb-row middle">
        <button class="key" data-val="=">=</button>
        <button class="key" data-val="&quot;">"</button>
        <button class="key" data-val="'">'</button>
        <button class="key" data-val=":">:</button>
        <button class="key" data-val=";">;</button>
        <button class="key" data-val="!">!</button>
        <button class="key" data-val="?">?</button>
        <button class="key" data-val="~">~</button>
        <button class="key" data-val="|">|</button>
      </div>
      <div class="kb-row">
        <button class="key" data-val="_">_</button>
        <button class="key" data-val="\">\</button>
        <button class="key" data-val="/">/</button>
        <button class="key" data-val="{">{</button>
        <button class="key" data-val="}">}</button>
        <button class="key" data-val="[">[</button>
        <button class="key" data-val="]">]</button>
        <button class="key special backspace" data-val="backspace">⌫</button>
      </div>
    </div>

    <div class="kb-row">
      <button class="key special symbols-toggle" data-val="symbols">!#1</button>
      <button class="key" data-val=",">,</button>
      <button class="key space" data-val="space">SPACE</button>
      <button class="key" data-val=".">.</button>
      <button class="key special go" data-val="go">GO</button>
    </div>
  </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAYHA8Qw3Qzbyg8MtjrSKcJusNi4VaA6V4",
        authDomain: "system-data-bf026.firebaseapp.com",
        databaseURL: "https://system-data-bf026-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "system-data-bf026",
        storageBucket: "system-data-bf026.firebasestorage.app",
        messagingSenderId: "718302899022",
        appId: "1:718302899022:web:f1675dbcc293e138c68c1f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'infinity_notes_data'); 

    const notesList = document.getElementById('notes-list');
    const mainInput = document.getElementById('main-input');

    let allNotes = [];

    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        if (data && data.notes) {
            allNotes = data.notes;
            renderAll();
        } else { renderAll(); }
    });

    function pushToFirebase() {
        set(dbRef, { notes: allNotes });
    }

    function renderAll() {
        notesList.innerHTML = '';
        allNotes.forEach(note => {
            const row = createNoteRow(note.text);
            notesList.appendChild(row);
        });
        setTimeout(() => { notesList.scrollTop = notesList.scrollHeight; }, 10);
    }

    function createNoteRow(text) {
        const row = document.createElement('div');
        row.className = 'note-row grid-row';
        row.innerHTML = `
            <div class="spacer-line number"></div>
            <div class="content-wrapper">
                <div class="delete-hint">SWIPE TO DELETE</div>
                <div class="note-content" contenteditable="true" spellcheck="false" inputmode="none">${text}</div>
                <button class="desktop-delete-btn">×</button>
            </div>`;
        
        const content = row.querySelector('.note-content');
        
        content.oninput = () => {
            const idx = Array.from(notesList.children).indexOf(row);
            if(idx > -1) { allNotes[idx].text = content.innerText; pushToFirebase(); }
        };

        row.querySelector('.desktop-delete-btn').onclick = () => {
            const idx = Array.from(notesList.children).indexOf(row);
            if(idx > -1) { allNotes.splice(idx, 1); pushToFirebase(); }
        };

        let startX = 0;
        content.ontouchstart = (e) => startX = e.touches[0].clientX;
        content.ontouchmove = (e) => {
            let diff = e.touches[0].clientX - startX;
            if(diff < -20) content.style.transform = `translateX(${diff+20}px)`;
        };
        content.ontouchend = (e) => {
            let diff = e.changedTouches[0].clientX - startX;
            content.style.transition = 'transform 0.3s';
            if(diff < -150) {
                 content.style.transform = 'translateX(-100%)';
                 setTimeout(() => row.querySelector('.desktop-delete-btn').click(), 300);
            } else { content.style.transform = 'translateX(0)'; }
        };
        return row;
    }

    window.saveMainInput = function() {
        const txt = mainInput.innerText.trim();
        if(txt) {
            allNotes.push({ text: txt });
            mainInput.innerText = "";
            pushToFirebase();
        }
    };
</script>

<script>
  // Advanced Custom Keyboard Logic
  document.addEventListener('DOMContentLoaded', () => {
    let activeInput = document.getElementById('main-input');
    const keys = document.querySelectorAll('.key');
    const shiftKey = document.querySelector('.shift');
    let isCapsLocked = false;

    function updateCaretAndScroll(el) {
        if (typeof window.getSelection !== "undefined" && typeof document.createRange !== "undefined") {
            const range = document.createRange();
            range.selectNodeContents(el);
            range.collapse(false); 
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }
        el.scrollLeft = el.scrollWidth; 
    }

    document.addEventListener('focusin', (e) => {
        if (e.target.classList.contains('note-content')) {
            activeInput = e.target;
            updateCaretAndScroll(activeInput);
        }
    });

    keys.forEach(key => {
      key.addEventListener('pointerdown', e => e.preventDefault());

      key.addEventListener('click', (e) => {
        e.preventDefault(); 
        const val = key.getAttribute('data-val');

        if (val === 'backspace') {
          activeInput.textContent = activeInput.textContent.slice(0, -1);
          activeInput.dispatchEvent(new Event('input')); 
          updateCaretAndScroll(activeInput);
        } 
        else if (val === 'space') {
          activeInput.textContent += '\u00A0';
          activeInput.dispatchEvent(new Event('input'));
          updateCaretAndScroll(activeInput);
        } 
        else if (val === 'shift') {
          isCapsLocked = !isCapsLocked;
          if(isCapsLocked) {
              shiftKey.classList.add('active');
          } else {
              shiftKey.classList.remove('active');
          }
        } 
        else if (val === 'symbols') {
          const lettersLayout = document.getElementById('layout-letters');
          const symbolsLayout = document.getElementById('layout-symbols');
          const toggleBtn = document.querySelector('.symbols-toggle');

          if (symbolsLayout.style.display === 'none') {
              lettersLayout.style.display = 'none';
              symbolsLayout.style.display = 'contents';
              toggleBtn.innerText = 'ABC';
          } else {
              lettersLayout.style.display = 'contents';
              symbolsLayout.style.display = 'none';
              toggleBtn.innerText = '!#1';
          }
        } 
        else if (val === 'go') {
          if (activeInput.id === 'main-input') {
              window.saveMainInput();
          } else {
              activeInput.blur();
              activeInput = document.getElementById('main-input');
              activeInput.focus();
          }
        } 
        else if (val) {
          let charToAdd = val;
          if (isCapsLocked && /[a-z]/.test(charToAdd)) {
            charToAdd = charToAdd.toUpperCase();
          }
          activeInput.textContent += charToAdd;
          activeInput.dispatchEvent(new Event('input'));
          updateCaretAndScroll(activeInput);
        }
      });
    });
  });
</script>

</body>
</html>
